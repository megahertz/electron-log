name: Tests

on: push

env:
  CI: 1

defaults:
  run:
    shell: bash

jobs:
  main:
    strategy:
      matrix:
        include:
          # Different node version
          - os: ubuntu-latest
            node_version: latest
            electron_version: latest
            experimental: false
          - os: ubuntu-latest
            node_version: 14
            electron_version: 41
            nw_version: 0.85.0
            experimental: true

          # Different electron version
          - os: ubuntu-latest
            node_version: latest
            electron_version: 16
            experimental: true
          - os: ubuntu-latest
            node_version: latest
            electron_version: 13
            experimental: true

          # Different OS
          - os: macos-latest
            node_version: latest
            electron_version: latest
            experimental: true
          - os: windows-latest
            node_version: builtin # For an unknown reason, setup-node freezes
            electron_version: latest
            experimental: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
        if: matrix.node_version != 'builtin'

      - run: npm config set script-shell 'bash'
        if: runner.os == 'Windows'

      - run: |
          if [ "${{ matrix.electron_version }}" != 'latest' ]; then
            npm install -D electron@${{ matrix.electron_version }}
          fi
          if [ -n "${{ matrix.nw_version }}" ]; then
            npm install -D nw@${{ matrix.nw_version }}
          fi
          npm install
          if [ ! -f node_modules/electron/path.txt ]; then
            ZIPPATH=$(cd node_modules/electron && node -e "(async () => {
              const { downloadArtifact } = await import('@electron/get');
              const { version } = require('./package.json');
              const zipPath = await downloadArtifact({ version, artifactName: 'electron', platform: process.platform, arch: process.arch });
              process.stdout.write(zipPath);
            })().catch(e => { console.error(e); process.exit(1); });")
            echo "Downloaded $ZIPPATH, extracting via system unzip..."
            mkdir -p node_modules/electron/dist
            unzip -q -o "$ZIPPATH" -d node_modules/electron/dist
            case "$RUNNER_OS" in
              Linux)   printf electron                                > node_modules/electron/path.txt ;;
              macOS)   printf "Electron.app/Contents/MacOS/Electron"  > node_modules/electron/path.txt ;;
              Windows) printf electron.exe                            > node_modules/electron/path.txt ;;
            esac
          fi
          test -f node_modules/electron/path.txt || { echo "ERROR: path.txt missing"; ls -la node_modules/electron/; exit 1; }

      - run: |
          if [ "${RUNNER_OS}" = 'Linux' ]; then
            xvfb-run --auto-servernum npm run test:full
          else
            npm run test:full
          fi

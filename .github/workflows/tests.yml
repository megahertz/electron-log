name: Tests

on: push

env:
  CI: 1

defaults:
  run:
    shell: bash

jobs:
  main:
    strategy:
      matrix:
        include:
          # Different node version
          - os: ubuntu-latest
            node_version: latest
            electron_version: latest
            experimental: false
          - os: ubuntu-latest
            node_version: 14
            electron_version: 41
            nw_version: 0.81.0
            experimental: true

          # Different electron version
          - os: ubuntu-latest
            node_version: latest
            electron_version: 13
            experimental: true

          # Different OS
          - os: macos-latest
            node_version: latest
            electron_version: latest
            experimental: true
          - os: windows-latest
            node_version: latest
            electron_version: latest
            experimental: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}

      - run: |
          if [ "${{ matrix.electron_version }}" != 'latest' ]; then
            npm install -D electron@${{ matrix.electron_version }}
          fi
          if [ -n "${{ matrix.nw_version }}" ]; then
            npm install -D nw@${{ matrix.nw_version }}
          fi
          npm install
          # Workaround for broken electron@42 installer on modern Node.
          # Remove this call when upgrading to electron 43+ and the
          # upstream installer works again.
          .github/scripts/install-electron.sh

      - run: |
          if [ "${RUNNER_OS}" = 'Linux' ]; then
            xvfb-run --auto-servernum npm run test:full
          else
            npm run test:full
          fi
